site_name: Tsunami
site_description: AI-assisted hardware waveform debugging tool
repo_url: https://github.com/zarubaf/tsunami
repo_name: zarubaf/tsunami

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - tables

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - CLI: guide/cli.md
      - Python Library: guide/python.md
      - Predicate DSL: guide/predicates.md
      - MCP Server: guide/mcp.md
  - API Reference:
      - Engine: api/engine.md
      - Predicate DSL: api/predicate.md
      - Time Parser: api/time_parse.md
  - Design Document: design-doc.md
